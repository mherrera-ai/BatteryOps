<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">BatteryOps pipeline visual</title>
  <desc id="desc">A simple offline workflow diagram from NASA raw data to preprocessing, models, retrieval, report, and the Streamlit dashboard.</desc>
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f6f8"/>
      <stop offset="100%" stop-color="#e7edf3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#13212f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="700" fill="url(#band)"/>
  <text x="90" y="95" fill="#0f2742" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">BatteryOps workflow</text>
  <text x="90" y="138" fill="#526170" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="22">Offline by default. Raw NASA data can be preprocessed locally and turned into demo-ready artifacts.</text>

  <g filter="url(#shadow)" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">
    <rect x="80" y="235" rx="26" ry="26" width="210" height="150" fill="#0f2742"/>
    <text x="125" y="292" fill="#ffffff" font-size="26" font-weight="700">NASA ZIP</text>
    <text x="118" y="327" fill="#dbe6ef" font-size="18">manual download</text>
    <text x="118" y="352" fill="#dbe6ef" font-size="18">kept out of git</text>

    <polygon points="315,305 360,280 360,330" fill="#f4b942"/>

    <rect x="385" y="235" rx="26" ry="26" width="220" height="150" fill="#1d5fa7"/>
    <text x="435" y="292" fill="#ffffff" font-size="26" font-weight="700">Preprocess</text>
    <text x="423" y="327" fill="#eaf3fb" font-size="18">normalize telemetry</text>
    <text x="434" y="352" fill="#eaf3fb" font-size="18">save parquet</text>

    <polygon points="625,305 670,280 670,330" fill="#f4b942"/>

    <rect x="695" y="235" rx="26" ry="26" width="220" height="150" fill="#1f8a70"/>
    <text x="755" y="292" fill="#ffffff" font-size="26" font-weight="700">Models</text>
    <text x="723" y="327" fill="#eaf7f2" font-size="18">RUL + anomaly</text>
    <text x="735" y="352" fill="#eaf7f2" font-size="18">simple baselines</text>

    <polygon points="935,305 980,280 980,330" fill="#f4b942"/>

    <rect x="1005" y="235" rx="26" ry="26" width="210" height="150" fill="#f4b942"/>
    <text x="1038" y="292" fill="#13212f" font-size="26" font-weight="700">Reports</text>
    <text x="1037" y="327" fill="#13212f" font-size="18">incident context</text>
    <text x="1040" y="352" fill="#13212f" font-size="18">retrieval evidence</text>

    <polygon points="1240,305 1285,280 1285,330" fill="#f4b942"/>

    <rect x="1320" y="235" rx="26" ry="26" width="210" height="150" fill="#13212f"/>
    <text x="1353" y="292" fill="#ffffff" font-size="26" font-weight="700">Streamlit</text>
    <text x="1360" y="327" fill="#dbe6ef" font-size="18">recruiter UI</text>
    <text x="1348" y="352" fill="#dbe6ef" font-size="18">demo mode ready</text>
  </g>

  <g font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif">
    <rect x="120" y="470" rx="22" ry="22" width="1360" height="140" fill="#ffffff" filter="url(#shadow)"/>
    <text x="160" y="522" fill="#0f2742" font-size="24" font-weight="700">What the reviewer sees</text>
    <text x="160" y="560" fill="#526170" font-size="20">overview snapshot, live replay, anomaly timeline, incident report, similar cases, and evaluation metrics</text>
    <text x="160" y="594" fill="#526170" font-size="20">fast startup from checked-in demo artifacts, with a path to genuine NASA-backed parquet when raw data is available</text>
  </g>
</svg>
