<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">BatteryOps hero visual</title>
  <desc id="desc">A clean repository hero illustration showing NASA battery data flowing into parquet artifacts and a Streamlit triage dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2742"/>
      <stop offset="60%" stop-color="#16355a"/>
      <stop offset="100%" stop-color="#f3f6f8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#f8fbfe" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#13212f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1350" cy="130" r="260" fill="#1d5fa7" fill-opacity="0.16"/>
  <circle cx="1425" cy="160" r="150" fill="#f4b942" fill-opacity="0.14"/>
  <circle cx="265" cy="730" r="220" fill="#1f8a70" fill-opacity="0.10"/>

  <text x="110" y="145" fill="#ffffff" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">BatteryOps</text>
  <text x="110" y="198" fill="#dbe6ef" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="26">Local-first telemetry triage and predictive maintenance on public NASA battery data</text>

  <g filter="url(#shadow)">
    <rect x="110" y="260" rx="28" ry="28" width="560" height="410" fill="url(#panel)"/>
    <rect x="720" y="220" rx="30" ry="30" width="770" height="490" fill="#0f2742" fill-opacity="0.92"/>
  </g>

  <text x="150" y="325" fill="#13212f" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Project signals</text>
  <g font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="22" fill="#13212f">
    <rect x="150" y="360" rx="18" ry="18" width="150" height="54" fill="#e8f1fb"/>
    <text x="175" y="395">Local-first</text>
    <rect x="318" y="360" rx="18" ry="18" width="184" height="54" fill="#eef8f4"/>
    <text x="345" y="395">No paid APIs</text>
    <rect x="520" y="360" rx="18" ry="18" width="110" height="54" fill="#fff5df"/>
    <text x="546" y="395">Parquet</text>
  </g>
  <g font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="20" fill="#13212f">
    <text x="150" y="470">Baseline models with transparent artifacts</text>
    <text x="150" y="515">Demo mode loads fast without retraining every time</text>
    <text x="150" y="560">Honest scope: telemetry analysis, not production EV safety software</text>
  </g>

  <text x="770" y="295" fill="#ffffff" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Data flow</text>
  <g font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="20" fill="#dbe6ef">
    <rect x="780" y="345" rx="18" ry="18" width="150" height="98" fill="#173d65"/>
    <text x="822" y="386">NASA</text>
    <text x="802" y="414">raw archive</text>
    <polygon points="954,392 1000,366 1000,418" fill="#f4b942"/>
    <rect x="1020" y="345" rx="18" ry="18" width="180" height="98" fill="#1c4c7f"/>
    <text x="1060" y="386">Processed</text>
    <text x="1062" y="414">parquet</text>
    <polygon points="1222,392 1268,366 1268,418" fill="#f4b942"/>
    <rect x="1288" y="345" rx="18" ry="18" width="168" height="98" fill="#245f99"/>
    <text x="1318" y="386">Streamlit</text>
    <text x="1316" y="414">triage app</text>
  </g>

  <g font-family="IBM Plex Mono, Consolas, monospace" font-size="18" fill="#dbe6ef">
    <rect x="780" y="500" rx="22" ry="22" width="680" height="150" fill="#132a47"/>
    <text x="810" y="545">asset_id: DEMO-03</text>
    <text x="810" y="578">latest_cycle: 28</text>
    <text x="810" y="611">artifact_mode: processed-or-demo fallback, always local</text>
  </g>
</svg>
